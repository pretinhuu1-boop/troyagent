<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="troy-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0f172a"/>
  <circle cx="60" cy="60" r="56" stroke="url(#troy-gradient)" stroke-width="4"/>
  <!-- T letter -->
  <text x="37" y="54" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="48" fill="url(#troy-gradient)">T</text>
  <!-- V letter -->
  <text x="62" y="54" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="48" fill="url(#troy-gradient)">V</text>
  <!-- Underline accent -->
  <rect x="30" y="62" width="60" height="3" rx="1.5" fill="url(#troy-gradient)" opacity="0.6"/>
  <!-- "agent" text -->
  <text x="60" y="82" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="3">AGENT</text>
</svg>
