<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <g stroke="#8b3535" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>
  <!-- Brain cross-section outline -->
  <ellipse cx="300" cy="240" rx="160" ry="130" fill="none" stroke="#8b3535" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Hypothalamus region -->
  <ellipse cx="300" cy="300" rx="40" ry="25" fill="#8b3535" fill-opacity="0.1" stroke="#8b3535" stroke-opacity="0.3" stroke-width="1"/>
  <text x="300" y="304" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="7" opacity="0.6">HIPOTÁLAMO</text>
  <!-- MC3R / MC4R receptor nodes -->
  <circle cx="250" cy="270" r="14" fill="#8b3535" fill-opacity="0.08" stroke="#8b3535" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="250" y="274" text-anchor="middle" fill="#8b3535" font-family="monospace" font-size="7" opacity="0.7">MC3R</text>
  <circle cx="350" cy="270" r="14" fill="#8b3535" fill-opacity="0.08" stroke="#8b3535" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="350" y="274" text-anchor="middle" fill="#8b3535" font-family="monospace" font-size="7" opacity="0.7">MC4R</text>
  <!-- Signal cascade -->
  <g stroke="#8b3535" stroke-opacity="0.15" stroke-width="0.8" stroke-dasharray="3 3">
    <line x1="250" y1="284" x2="270" y2="295"/>
    <line x1="350" y1="284" x2="330" y2="295"/>
    <line x1="300" y1="325" x2="300" y2="370"/>
  </g>
  <!-- Dopamine / Oxytocin downstream -->
  <g transform="translate(240, 390)">
    <rect x="-25" y="-10" width="50" height="20" rx="3" fill="none" stroke="#8b3535" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="7" opacity="0.5">DA↑</text>
  </g>
  <g transform="translate(360, 390)">
    <rect x="-25" y="-10" width="50" height="20" rx="3" fill="none" stroke="#8b3535" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="7" opacity="0.5">OXT↑</text>
  </g>
  <line x1="280" y1="370" x2="240" y2="380" stroke="#8b3535" stroke-opacity="0.12" stroke-width="0.5"/>
  <line x1="320" y1="370" x2="360" y2="380" stroke="#8b3535" stroke-opacity="0.12" stroke-width="0.5"/>
  <!-- Cyclic peptide ring -->
  <g transform="translate(300, 170)">
    <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="none" stroke="#8b3535" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="0" cy="-25" r="3" fill="#8b3535" fill-opacity="0.4"/>
    <circle cx="22" cy="-12" r="3" fill="#8b3535" fill-opacity="0.4"/>
    <circle cx="22" cy="12" r="3" fill="#8b3535" fill-opacity="0.4"/>
    <circle cx="0" cy="25" r="3" fill="#8b3535" fill-opacity="0.4"/>
    <circle cx="-22" cy="12" r="3" fill="#8b3535" fill-opacity="0.4"/>
    <circle cx="-22" cy="-12" r="3" fill="#8b3535" fill-opacity="0.4"/>
    <text x="0" y="4" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="7" opacity="0.4">CÍCLICO</text>
  </g>
  <!-- Glow -->
  <circle cx="300" cy="300" r="50" fill="#8b3535" fill-opacity="0.05" filter="url(#blur2)"/>
  <!-- Label -->
  <text x="300" y="480" text-anchor="middle" fill="#f2efe9" font-family="monospace" font-size="14" letter-spacing="6" opacity="0.4">P41</text>
  <text x="300" y="504" text-anchor="middle" fill="#8b3535" font-family="monospace" font-size="10" letter-spacing="3" opacity="0.3">MELANOCORTINA</text>
</svg>