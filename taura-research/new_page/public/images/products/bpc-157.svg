<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0508"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>
  <!-- Tissue repair visualization - healing strands -->
  <g stroke="#8b2035" stroke-opacity="0.15" stroke-width="1" fill="none">
    <!-- Broken strand left -->
    <path d="M120 200 Q160 210 200 200 Q240 190 260 210"/>
    <path d="M120 230 Q160 240 200 230 Q240 220 260 240"/>
    <path d="M120 260 Q160 270 200 260 Q240 250 260 270"/>
    <!-- Broken strand right -->
    <path d="M340 210 Q360 190 400 200 Q440 210 480 200"/>
    <path d="M340 240 Q360 220 400 230 Q440 240 480 230"/>
    <path d="M340 270 Q360 250 400 260 Q440 270 480 260"/>
  </g>
  <!-- Healing bridge / repair zone -->
  <g stroke="#8b2035" stroke-opacity="0.3" stroke-width="1.5" fill="none" stroke-dasharray="4 3">
    <path d="M260 210 Q300 200 340 210"/>
    <path d="M260 240 Q300 230 340 240"/>
    <path d="M260 270 Q300 260 340 270"/>
  </g>
  <!-- Central repair glow -->
  <circle cx="300" cy="240" r="50" fill="#8b2035" fill-opacity="0.05" filter="url(#blur2)"/>
  <!-- NO system -->
  <g transform="translate(300, 360)">
    <circle r="30" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="11" opacity="0.6">NO</text>
    <!-- Bidirectional arrows -->
    <line x1="-40" y1="-10" x2="-55" y2="-20" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="-40" y1="10" x2="-55" y2="20" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="40" y1="-10" x2="55" y2="-20" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="40" y1="10" x2="55" y2="20" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  </g>
  <!-- VEGF / angiogenesis hint -->
  <g fill="#8b2035" font-family="monospace" font-size="7" opacity="0.3">
    <text x="200" y="340">VEGF↑</text>
    <text x="370" y="340">FAK↑</text>
    <text x="200" y="400">GHR↑</text>
    <text x="370" y="400">COL-I↑</text>
  </g>
  <!-- 15 amino acid dots -->
  <g fill="#8b2035" fill-opacity="0.3">
    <circle cx="150" cy="460" r="3"/><circle cx="175" cy="460" r="3"/><circle cx="200" cy="460" r="3"/>
    <circle cx="225" cy="460" r="3"/><circle cx="250" cy="460" r="3"/><circle cx="275" cy="460" r="3"/>
    <circle cx="300" cy="460" r="3"/><circle cx="325" cy="460" r="3"/><circle cx="350" cy="460" r="3"/>
    <circle cx="375" cy="460" r="3"/><circle cx="400" cy="460" r="3"/><circle cx="425" cy="460" r="3"/>
    <circle cx="150" cy="480" r="3"/><circle cx="175" cy="480" r="3"/><circle cx="200" cy="480" r="3"/>
  </g>
  <text x="300" y="478" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="7" opacity="0.2">15 AMINOÁCIDOS</text>
  <!-- Label -->
  <text x="300" y="530" text-anchor="middle" fill="#f2efe9" font-family="monospace" font-size="14" letter-spacing="6" opacity="0.4">BC5</text>
  <text x="300" y="554" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="10" letter-spacing="3" opacity="0.3">RECUPERAÇÃO</text>
</svg>