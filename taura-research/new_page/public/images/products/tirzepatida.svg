<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#160a0a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>
  <!-- Dual receptor - two interlocking rings -->
  <ellipse cx="240" cy="270" rx="100" ry="90" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.5" transform="rotate(-15 240 270)"/>
  <ellipse cx="360" cy="270" rx="100" ry="90" fill="none" stroke="#c4a882" stroke-opacity="0.15" stroke-width="1.5" transform="rotate(15 360 270)"/>
  <!-- Intersection glow -->
  <ellipse cx="300" cy="270" rx="40" ry="60" fill="#8b2035" fill-opacity="0.06" filter="url(#blur1)"/>
  <!-- GIP label -->
  <circle cx="180" cy="240" r="20" fill="#c4a882" fill-opacity="0.08" stroke="#c4a882" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="180" y="244" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="9" opacity="0.7">GIP</text>
  <!-- GLP-1 label -->
  <circle cx="420" cy="240" r="20" fill="#8b2035" fill-opacity="0.08" stroke="#8b2035" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="420" y="244" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" opacity="0.7">GLP-1</text>
  <!-- Synergy center -->
  <circle cx="300" cy="270" r="4" fill="#8b2035" fill-opacity="0.7"/>
  <circle cx="300" cy="270" r="12" fill="none" stroke="#8b2035" stroke-opacity="0.3" stroke-dasharray="2 3"/>
  <!-- Fatty acid chain (C20) -->
  <g stroke="#c4a882" stroke-opacity="0.12" stroke-width="0.8" fill="none">
    <path d="M300 310 L300 340 L310 360 L300 380 L310 400 L300 420"/>
    <text x="320" y="365" fill="#c4a882" font-family="monospace" font-size="7" opacity="0.3">C20</text>
  </g>
  <!-- Albumin binding hint -->
  <circle cx="300" cy="420" r="15" fill="none" stroke="#c4a882" stroke-opacity="0.1" stroke-width="0.5" stroke-dasharray="4 4"/>
  <!-- Glow -->
  <circle cx="300" cy="270" r="70" fill="#8b2035" fill-opacity="0.05" filter="url(#blur2)"/>
  <!-- Label -->
  <text x="300" y="500" text-anchor="middle" fill="#f2efe9" font-family="monospace" font-size="14" letter-spacing="6" opacity="0.4">TZP</text>
  <text x="300" y="524" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="10" letter-spacing="3" opacity="0.3">DUAL GIP/GLP-1</text>
</svg>