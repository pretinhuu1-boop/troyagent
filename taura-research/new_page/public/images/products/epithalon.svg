<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d0a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <g stroke="#5a4a8b" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>
  <!-- Telomere / DNA helix -->
  <g transform="translate(300, 50)">
    <!-- Double helix -->
    <g stroke="#5a4a8b" stroke-opacity="0.3" stroke-width="1.5" fill="none">
      <path d="M-30,0 Q0,25 30,50 Q0,75 -30,100 Q0,125 30,150 Q0,175 -30,200 Q0,225 30,250 Q0,275 -30,300 Q0,325 30,350 Q0,375 -30,400"/>
      <path d="M30,0 Q0,25 -30,50 Q0,75 30,100 Q0,125 -30,150 Q0,175 30,200 Q0,225 -30,250 Q0,275 30,300 Q0,325 -30,350 Q0,375 30,400"/>
    </g>
    <!-- Rungs -->
    <g stroke="#5a4a8b" stroke-opacity="0.12" stroke-width="0.8">
      <line x1="-20" y1="25" x2="20" y2="25"/><line x1="-28" y1="50" x2="28" y2="50"/>
      <line x1="-20" y1="75" x2="20" y2="75"/><line x1="-28" y1="100" x2="28" y2="100"/>
      <line x1="-20" y1="125" x2="20" y2="125"/><line x1="-28" y1="150" x2="28" y2="150"/>
      <line x1="-20" y1="175" x2="20" y2="175"/><line x1="-28" y1="200" x2="28" y2="200"/>
      <line x1="-20" y1="225" x2="20" y2="225"/><line x1="-28" y1="250" x2="28" y2="250"/>
      <line x1="-20" y1="275" x2="20" y2="275"/><line x1="-28" y1="300" x2="28" y2="300"/>
      <line x1="-20" y1="325" x2="20" y2="325"/><line x1="-28" y1="350" x2="28" y2="350"/>
      <line x1="-20" y1="375" x2="20" y2="375"/>
    </g>
    <!-- Telomere caps (brighter at ends) -->
    <rect x="-35" y="-10" width="70" height="20" rx="4" fill="#5a4a8b" fill-opacity="0.15" stroke="#5a4a8b" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="7" opacity="0.7">TELÔMERO</text>
    <rect x="-35" y="390" width="70" height="20" rx="4" fill="#5a4a8b" fill-opacity="0.15" stroke="#5a4a8b" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="0" y="405" text-anchor="middle" fill="#c4a882" font-family="monospace" font-size="7" opacity="0.7">TELÔMERO</text>
  </g>
  <!-- Telomerase activation indicator -->
  <g transform="translate(140, 250)">
    <text x="0" y="0" fill="#5a4a8b" font-family="monospace" font-size="8" opacity="0.4">hTERT ↑</text>
    <text x="0" y="15" fill="#5a4a8b" font-family="monospace" font-size="7" opacity="0.3">TELOMERASE</text>
  </g>
  <!-- Melatonin/circadian -->
  <g transform="translate(430, 250)">
    <text x="0" y="0" fill="#5a4a8b" font-family="monospace" font-size="8" opacity="0.4">MLT ↑</text>
    <text x="0" y="15" fill="#5a4a8b" font-family="monospace" font-size="7" opacity="0.3">CIRCADIANO</text>
  </g>
  <!-- Glow on helix -->
  <ellipse cx="300" cy="280" rx="40" ry="150" fill="#5a4a8b" fill-opacity="0.04" filter="url(#blur2)"/>
  <!-- Label -->
  <text x="300" y="520" text-anchor="middle" fill="#f2efe9" font-family="monospace" font-size="14" letter-spacing="6" opacity="0.4">EPT</text>
  <text x="300" y="544" text-anchor="middle" fill="#5a4a8b" font-family="monospace" font-size="10" letter-spacing="3" opacity="0.3">LONGEVIDADE</text>
  <!-- Sequence -->
  <text x="300" y="570" text-anchor="middle" fill="#5a4a8b" font-family="monospace" font-size="7" letter-spacing="2" opacity="0.15">Ala-Glu-Asp-Gly</text>
</svg>