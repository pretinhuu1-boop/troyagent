<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5a8b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a1a3a" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <!-- Neural network pattern -->
  <g stroke="#4a5a8b" stroke-opacity="0.08" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/><line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/><line x1="500" y1="0" x2="500" y2="600"/>
  </g>
  <!-- Brain/neural visualization -->
  <!-- Neuron body -->
  <ellipse cx="300" cy="260" rx="60" ry="50" fill="none" stroke="#4a5a8b" stroke-opacity="0.3" stroke-width="1.5"/>
  <ellipse cx="300" cy="260" rx="30" ry="25" fill="#4a5a8b" fill-opacity="0.08"/>
  <!-- Nucleus -->
  <circle cx="300" cy="260" r="12" fill="#4a5a8b" fill-opacity="0.2" stroke="#4a5a8b" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Dendrites -->
  <g stroke="#4a5a8b" stroke-opacity="0.2" stroke-width="1" fill="none">
    <path d="M240 240 Q200 200 160 180 Q140 170 120 175"/>
    <path d="M240 260 Q190 250 150 240 Q130 235 110 240"/>
    <path d="M240 280 Q200 310 170 340 Q150 360 130 355"/>
    <path d="M260 215 Q240 170 230 130 Q225 110 230 95"/>
    <path d="M300 210 Q290 160 300 120 Q305 100 320 90"/>
    <path d="M340 215 Q360 170 370 140 Q375 120 390 110"/>
  </g>
  <!-- Axon -->
  <path d="M360 260 Q400 260 440 270 Q480 280 500 290" stroke="#4a5a8b" stroke-opacity="0.25" stroke-width="1.5" fill="none"/>
  <!-- Synaptic terminals -->
  <circle cx="500" cy="290" r="8" fill="#4a5a8b" fill-opacity="0.15" stroke="#4a5a8b" stroke-opacity="0.3"/>
  <circle cx="510" cy="310" r="6" fill="#4a5a8b" fill-opacity="0.1" stroke="#4a5a8b" stroke-opacity="0.2"/>
  <circle cx="520" cy="280" r="5" fill="#4a5a8b" fill-opacity="0.1" stroke="#4a5a8b" stroke-opacity="0.2"/>
  <!-- BDNF markers -->
  <g fill="#c4a882" font-family="monospace" font-size="8" opacity="0.5">
    <text x="100" y="175">BDNF↑</text>
    <text x="90" y="245">NGF↑</text>
    <text x="215" y="90">TrkB</text>
    <text x="515" y="295">MC4R</text>
  </g>
  <!-- Glow -->
  <circle cx="300" cy="260" r="80" fill="url(#glow)" filter="url(#blur2)" opacity="0.5"/>
  <!-- Signal dots -->
  <circle cx="440" cy="270" r="2" fill="#4a5a8b" fill-opacity="0.6"/>
  <circle cx="460" cy="275" r="1.5" fill="#4a5a8b" fill-opacity="0.4"/>
  <circle cx="480" cy="282" r="1.5" fill="#4a5a8b" fill-opacity="0.3"/>
  <!-- Label -->
  <text x="300" y="480" text-anchor="middle" fill="#f2efe9" font-family="monospace" font-size="14" letter-spacing="6" opacity="0.4">SMX</text>
  <text x="300" y="504" text-anchor="middle" fill="#4a5a8b" font-family="monospace" font-size="10" letter-spacing="3" opacity="0.3">NOOTRÓPICO</text>
  <!-- Peptide sequence hint -->
  <text x="300" y="540" text-anchor="middle" fill="#4a5a8b" font-family="monospace" font-size="7" letter-spacing="2" opacity="0.15">Met-Glu-His-Phe-Pro-Gly-Pro</text>
</svg>