<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <g stroke="#c4882a" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>
  <!-- Mitochondria visualization -->
  <ellipse cx="300" cy="270" rx="150" ry="80" fill="none" stroke="#c4882a" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Inner membrane (cristae) -->
  <g stroke="#c4882a" stroke-opacity="0.15" stroke-width="1" fill="none">
    <path d="M180 270 Q200 230 220 270 Q240 310 260 270 Q280 230 300 270 Q320 310 340 270 Q360 230 380 270 Q400 310 420 270"/>
  </g>
  <!-- ERRα receptor -->
  <g transform="translate(300, 160)">
    <rect x="-30" y="-15" width="60" height="30" rx="4" fill="#c4882a" fill-opacity="0.1" stroke="#c4882a" stroke-opacity="0.3" stroke-width="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#c4882a" font-family="monospace" font-size="9" opacity="0.7">ERRα</text>
  </g>
  <!-- Activation arrow -->
  <line x1="300" y1="190" x2="300" y2="230" stroke="#c4882a" stroke-opacity="0.2" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Muscle fiber lines -->
  <g stroke="#c4882a" stroke-opacity="0.08" stroke-width="2">
    <line x1="120" y1="400" x2="120" y2="520"/><line x1="150" y1="390" x2="150" y2="530"/>
    <line x1="180" y1="395" x2="180" y2="525"/><line x1="210" y1="388" x2="210" y2="528"/>
    <line x1="240" y1="392" x2="240" y2="522"/><line x1="270" y1="386" x2="270" y2="526"/>
    <line x1="300" y1="390" x2="300" y2="530"/><line x1="330" y1="394" x2="330" y2="524"/>
    <line x1="360" y1="388" x2="360" y2="528"/><line x1="390" y1="392" x2="390" y2="522"/>
    <line x1="420" y1="396" x2="420" y2="520"/><line x1="450" y1="390" x2="450" y2="525"/>
    <line x1="480" y1="400" x2="480" y2="520"/>
  </g>
  <!-- Type I fiber markers -->
  <g fill="#c4882a" font-family="monospace" font-size="7" opacity="0.3">
    <text x="135" y="470" transform="rotate(-90 135 470)">TYPE I</text>
    <text x="315" y="470" transform="rotate(-90 315 470)">TYPE I</text>
    <text x="465" y="470" transform="rotate(-90 465 470)">TYPE I</text>
  </g>
  <!-- Glow -->
  <ellipse cx="300" cy="270" rx="100" ry="50" fill="#c4882a" fill-opacity="0.04" filter="url(#blur2)"/>
  <!-- Label -->
  <text x="300" y="560" text-anchor="middle" fill="#f2efe9" font-family="monospace" font-size="14" letter-spacing="6" opacity="0.4">PP332</text>
  <text x="300" y="580" text-anchor="middle" fill="#c4882a" font-family="monospace" font-size="10" letter-spacing="3" opacity="0.3">EXERCISE MIMETIC</text>
</svg>