<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="350" stroke="#C4C4C4" stroke-opacity="0.05" stroke-width="0.5"/>
  <!-- LEFT: Steroid - Full Activation -->
  <text x="200" y="60" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="8" opacity="0.25">STEROID</text>
  <!-- Steroid 4-ring structure -->
  <g stroke="#8b2035" stroke-opacity="0.25" stroke-width="1.2" fill="none">
    <!-- Ring A -->
    <polygon points="130,140 160,120 190,140 190,170 160,190 130,170"/>
    <!-- Ring B -->
    <polygon points="190,140 220,120 250,140 250,170 220,190 190,170"/>
    <!-- Ring C -->
    <polygon points="250,140 275,125 300,140 300,165 275,180 250,165"/>
    <!-- Ring D - 5-membered -->
    <polygon points="300,140 320,130 335,145 325,165 300,165"/>
  </g>
  <!-- Full activation glow - strong -->
  <ellipse cx="220" cy="155" rx="80" ry="40" fill="#8b2035" fill-opacity="0.08" filter="url(#g)"/>
  <!-- Full activation arrows - ALL directions -->
  <g stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.7">
    <line x1="200" y1="200" x2="150" y2="240"/>
    <line x1="200" y1="200" x2="200" y2="250"/>
    <line x1="200" y1="200" x2="250" y2="240"/>
    <line x1="200" y1="200" x2="120" y2="220"/>
    <line x1="200" y1="200" x2="280" y2="220"/>
  </g>
  <!-- Tissue labels -->
  <text x="120" y="255" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">MUSCLE</text>
  <text x="200" y="265" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">BONE</text>
  <text x="270" y="255" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">PROSTATE</text>
  <text x="100" y="230" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.15">LIVER</text>
  <text x="300" y="230" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.15">SKIN</text>
  <!-- All dots same intensity -->
  <g fill="#8b2035" fill-opacity="0.35">
    <circle cx="150" cy="243" r="3"/><circle cx="200" cy="253" r="3"/><circle cx="250" cy="243" r="3"/>
    <circle cx="120" cy="223" r="3"/><circle cx="280" cy="223" r="3"/>
  </g>
  <text x="200" y="300" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.3">FULL AGONISM</text>
  <!-- RIGHT: SARM - Selective -->
  <text x="600" y="60" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="8" opacity="0.25">SARM</text>
  <!-- SARM small molecule structure -->
  <g stroke="#8b2035" stroke-opacity="0.25" stroke-width="1.2" fill="none">
    <!-- Aromatic ring -->
    <polygon points="560,130 580,118 604,126 612,150 596,162 572,154"/>
    <!-- Linker -->
    <line x1="612" y1="150" x2="640" y2="155"/>
    <!-- Second ring (heterocycle) -->
    <polygon points="640,145 660,135 675,150 665,168 645,168"/>
  </g>
  <!-- Selective glow - moderate -->
  <ellipse cx="620" cy="150" rx="50" ry="25" fill="#8b2035" fill-opacity="0.05" filter="url(#g)"/>
  <!-- Selective arrows - only to muscle and bone (strong), others weak -->
  <g stroke="#8b2035" stroke-opacity="0.25" stroke-width="0.8">
    <line x1="580" y1="180" x2="540" y2="230"/>
    <line x1="600" y1="190" x2="600" y2="240"/>
  </g>
  <g stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.4">
    <line x1="620" y1="180" x2="660" y2="230"/>
    <line x1="580" y1="175" x2="510" y2="215"/>
    <line x1="640" y1="175" x2="690" y2="215"/>
  </g>
  <!-- Tissue labels right -->
  <text x="530" y="245" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.25">MUSCLE</text>
  <text x="600" y="260" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.25">BONE</text>
  <text x="670" y="245" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.1">PROSTATE</text>
  <text x="510" y="225" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.08">LIVER</text>
  <text x="700" y="225" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.08">SKIN</text>
  <!-- Selective dots - strong for muscle/bone, dim for rest -->
  <circle cx="540" cy="233" r="3.5" fill="#8b2035" fill-opacity="0.45"/>
  <circle cx="600" cy="248" r="3.5" fill="#8b2035" fill-opacity="0.4"/>
  <circle cx="660" cy="233" r="2" fill="#C4C4C4" fill-opacity="0.08"/>
  <circle cx="510" cy="218" r="1.5" fill="#C4C4C4" fill-opacity="0.06"/>
  <circle cx="690" cy="218" r="1.5" fill="#C4C4C4" fill-opacity="0.06"/>
  <text x="600" y="300" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.3">SELECTIVE AGONISM</text>
  <!-- VS label -->
  <text x="400" y="200" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="12" opacity="0.1">VS</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">SARMs</text>
</svg>