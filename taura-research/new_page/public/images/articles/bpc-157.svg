<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Stomach outline -->
  <path d="M520,100 Q580,100 600,140 Q630,200 600,260 Q570,310 520,320 Q460,330 420,300 Q380,280 360,240 Q340,200 360,160 Q370,130 400,110 Q440,90 520,100" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Broken tissue strands - left side -->
  <g stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="1">
    <line x1="180" y1="140" x2="280" y2="160"/>
    <line x1="180" y1="180" x2="270" y2="190"/>
    <line x1="180" y1="220" x2="275" y2="220"/>
    <line x1="180" y1="260" x2="280" y2="250"/>
  </g>
  <!-- Break gap -->
  <rect x="280" y="130" width="40" height="140" fill="#8b2035" fill-opacity="0.04" filter="url(#g)"/>
  <!-- Reconnecting tissue strands - right side -->
  <g stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="1">
    <line x1="320" y1="162" x2="400" y2="170"/>
    <line x1="315" y1="192" x2="400" y2="200"/>
    <line x1="318" y1="222" x2="400" y2="225"/>
    <line x1="320" y1="248" x2="400" y2="240"/>
  </g>
  <!-- Healing bridge connections (dashed) -->
  <g stroke="#8b2035" stroke-opacity="0.3" stroke-width="0.8" stroke-dasharray="3 3">
    <line x1="280" y1="160" x2="320" y2="162"/>
    <line x1="270" y1="190" x2="315" y2="192"/>
    <line x1="275" y1="220" x2="318" y2="222"/>
    <line x1="280" y1="250" x2="320" y2="248"/>
  </g>
  <!-- Healing glow at reconnection points -->
  <circle cx="300" cy="160" r="6" fill="#8b2035" fill-opacity="0.15" filter="url(#g2)"/>
  <circle cx="293" cy="190" r="6" fill="#8b2035" fill-opacity="0.15" filter="url(#g2)"/>
  <circle cx="297" cy="220" r="6" fill="#8b2035" fill-opacity="0.15" filter="url(#g2)"/>
  <circle cx="300" cy="250" r="6" fill="#8b2035" fill-opacity="0.15" filter="url(#g2)"/>
  <!-- Repair molecule dots -->
  <circle cx="295" cy="155" r="2" fill="#8b2035" fill-opacity="0.5"/>
  <circle cx="290" cy="188" r="2" fill="#8b2035" fill-opacity="0.5"/>
  <circle cx="293" cy="218" r="2" fill="#8b2035" fill-opacity="0.5"/>
  <circle cx="296" cy="248" r="2" fill="#8b2035" fill-opacity="0.5"/>
  <!-- Healing pattern radiating -->
  <circle cx="300" cy="200" r="30" fill="none" stroke="#8b2035" stroke-opacity="0.08" stroke-width="0.5"/>
  <circle cx="300" cy="200" r="50" fill="none" stroke="#8b2035" stroke-opacity="0.05" stroke-width="0.5"/>
  <circle cx="300" cy="200" r="70" fill="none" stroke="#8b2035" stroke-opacity="0.03" stroke-width="0.5"/>
  <!-- Growth factor particles -->
  <g fill="#C4C4C4" fill-opacity="0.12">
    <circle cx="340" cy="145" r="1.5"/>
    <circle cx="260" cy="170" r="1.5"/>
    <circle cx="330" cy="230" r="1.5"/>
    <circle cx="255" cy="240" r="1.5"/>
    <circle cx="350" cy="270" r="1.5"/>
  </g>
  <!-- Labels -->
  <text x="300" y="110" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.2">TISSUE REPAIR</text>
  <text x="500" y="210" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.25">GASTRIC JUICE</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">PEPTÍDEOS</text>
</svg>