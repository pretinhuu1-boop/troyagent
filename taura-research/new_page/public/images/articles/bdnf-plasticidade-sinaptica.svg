<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Presynaptic neuron (left) -->
  <ellipse cx="200" cy="200" rx="60" ry="50" fill="#8b2035" fill-opacity="0.04" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.2"/>
  <text x="200" y="195" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.25">PRESYNAPTIC</text>
  <!-- Axon terminal bulb -->
  <path d="M260,200 Q300,200 330,190 Q350,185 360,195 Q365,210 350,215 Q330,220 300,210 Q280,205 260,200" fill="#8b2035" fill-opacity="0.06" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <!-- Vesicles in terminal -->
  <circle cx="310" cy="198" r="5" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.5"/>
  <circle cx="325" cy="202" r="5" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.5"/>
  <circle cx="340" cy="198" r="5" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.5"/>
  <!-- Synaptic cleft -->
  <rect x="365" y="170" width="30" height="60" fill="#8b2035" fill-opacity="0.02"/>
  <text x="380" y="165" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.15" transform="rotate(-90,380,165)">CLEFT</text>
  <!-- BDNF molecules crossing the cleft -->
  <g fill="#8b2035" fill-opacity="0.45">
    <circle cx="370" cy="185" r="3.5" filter="url(#g2)"/>
    <circle cx="378" cy="200" r="4" filter="url(#g2)"/>
    <circle cx="372" cy="215" r="3" filter="url(#g2)"/>
    <circle cx="385" cy="190" r="3" filter="url(#g2)"/>
  </g>
  <text x="375" y="178" fill="#C4C4C4" font-family="monospace" font-size="4" opacity="0.35">BDNF</text>
  <text x="382" y="230" fill="#C4C4C4" font-family="monospace" font-size="4" opacity="0.35">BDNF</text>
  <!-- Movement arrows -->
  <g stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5">
    <line x1="360" y1="195" x2="368" y2="195"/>
    <line x1="362" y1="205" x2="374" y2="205"/>
    <line x1="358" y1="215" x2="370" y2="215"/>
  </g>
  <!-- Postsynaptic neuron (right) -->
  <ellipse cx="560" cy="200" rx="60" ry="50" fill="#8b2035" fill-opacity="0.04" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.2"/>
  <text x="560" y="195" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.25">POSTSYNAPTIC</text>
  <!-- Dendrite extending left -->
  <path d="M500,200 Q470,198 440,195 Q420,193 400,200 Q420,207 440,205 Q470,203 500,200" fill="#8b2035" fill-opacity="0.04" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <!-- Dendritic spines growing (new ones appearing) -->
  <g stroke="#8b2035" stroke-opacity="0.3" stroke-width="0.8">
    <line x1="420" y1="195" x2="415" y2="175"/>
    <circle cx="415" cy="173" r="3" fill="#8b2035" fill-opacity="0.2"/>
    <line x1="440" y1="194" x2="438" y2="170"/>
    <circle cx="438" cy="168" r="3.5" fill="#8b2035" fill-opacity="0.25"/>
    <line x1="460" y1="196" x2="455" y2="175"/>
    <circle cx="455" cy="173" r="3" fill="#8b2035" fill-opacity="0.2"/>
  </g>
  <!-- New growing spines (smaller, emerging) -->
  <g stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5" stroke-dasharray="2 2">
    <line x1="430" y1="195" x2="428" y2="182"/>
    <circle cx="428" cy="181" r="2" fill="#8b2035" fill-opacity="0.12"/>
    <line x1="450" y1="195" x2="448" y2="180"/>
    <circle cx="448" cy="179" r="2" fill="#8b2035" fill-opacity="0.12"/>
  </g>
  <!-- Bottom spines -->
  <g stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.6">
    <line x1="425" y1="205" x2="420" y2="225"/>
    <circle cx="420" cy="227" r="2.5" fill="#8b2035" fill-opacity="0.15"/>
    <line x1="445" y1="205" x2="442" y2="228"/>
    <circle cx="442" cy="230" r="3" fill="#8b2035" fill-opacity="0.2"/>
  </g>
  <!-- TrkB receptors on postsynaptic membrane -->
  <g fill="#C4C4C4" fill-opacity="0.2">
    <rect x="396" y="188" width="6" height="10" rx="1"/>
    <rect x="396" y="202" width="6" height="10" rx="1"/>
    <rect x="396" y="212" width="6" height="8" rx="1"/>
  </g>
  <text x="403" y="240" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4" opacity="0.2">TrkB</text>
  <!-- Signaling cascade inside postsynaptic -->
  <g stroke="#8b2035" stroke-opacity="0.08" stroke-width="0.4" stroke-dasharray="2 2">
    <line x1="410" y1="200" x2="450" y2="200"/>
    <line x1="450" y1="200" x2="480" y2="190"/>
    <line x1="450" y1="200" x2="480" y2="210"/>
  </g>
  <!-- Plasticity glow -->
  <ellipse cx="440" cy="195" rx="40" ry="30" fill="#8b2035" fill-opacity="0.04" filter="url(#g)"/>
  <!-- Axon from presynaptic neuron body -->
  <line x1="140" y1="200" x2="100" y2="200" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.8"/>
  <!-- Dendrite from postsynaptic -->
  <line x1="620" y1="200" x2="700" y2="200" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.8"/>
  <!-- Labels -->
  <text x="200" y="270" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.15">SOMA</text>
  <text x="560" y="270" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.15">SOMA</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">NOOTRÓPICOS</text>
</svg>