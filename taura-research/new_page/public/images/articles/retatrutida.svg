<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Triple receptor visualization - 3 interconnected rings -->
  <ellipse cx="310" cy="180" rx="90" ry="90" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.5"/>
  <ellipse cx="400" cy="220" rx="90" ry="90" fill="none" stroke="#6B0F1A" stroke-opacity="0.15" stroke-width="1.5"/>
  <ellipse cx="490" cy="180" rx="90" ry="90" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Intersection glow -->
  <ellipse cx="400" cy="195" rx="45" ry="50" fill="#8b2035" fill-opacity="0.08" filter="url(#g)"/>
  <!-- Receptor labels -->
  <text x="280" y="150" fill="#8b2035" font-family="monospace" font-size="8" letter-spacing="2" opacity="0.4">GLP-1</text>
  <text x="380" y="280" fill="#6B0F1A" font-family="monospace" font-size="8" letter-spacing="2" opacity="0.35">GIP</text>
  <text x="490" y="150" fill="#8b2035" font-family="monospace" font-size="8" letter-spacing="2" opacity="0.4">GCG</text>
  <!-- Binding dots -->
  <circle cx="355" cy="195" r="4" fill="#8b2035" fill-opacity="0.5"/><circle cx="400" cy="165" r="3" fill="#C4C4C4" fill-opacity="0.3"/>
  <circle cx="445" cy="195" r="4" fill="#8b2035" fill-opacity="0.5"/><circle cx="400" cy="230" r="3" fill="#C4C4C4" fill-opacity="0.3"/>
  <!-- Signal paths -->
  <g stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.8" stroke-dasharray="4 4">
    <line x1="310" y1="90" x2="310" y2="40"/><line x1="400" y1="310" x2="400" y2="360"/><line x1="490" y1="90" x2="490" y2="40"/>
  </g>
  <!-- Data points -->
  <circle cx="310" cy="40" r="3" fill="#C4C4C4" fill-opacity="0.2"/><circle cx="400" cy="360" r="3" fill="#C4C4C4" fill-opacity="0.2"/><circle cx="490" cy="40" r="3" fill="#C4C4C4" fill-opacity="0.2"/>
  <text x="400" y="380" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">AGONISMO TRIPLO</text>
</svg>