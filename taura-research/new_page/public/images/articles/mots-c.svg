<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Mitochondria outer membrane -->
  <ellipse cx="400" cy="190" rx="180" ry="110" fill="none" stroke="#8b2035" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Inner membrane with cristae -->
  <ellipse cx="400" cy="190" rx="155" ry="90" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <!-- Cristae folds -->
  <path d="M280,170 Q310,130 340,170" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <path d="M320,180 Q350,140 380,180" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <path d="M360,175 Q390,135 420,175" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <path d="M400,180 Q430,140 460,180" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <path d="M440,175 Q470,135 500,175" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <!-- Bottom cristae -->
  <path d="M300,210 Q330,250 360,210" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.7"/>
  <path d="M370,215 Q400,255 430,215" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.7"/>
  <path d="M440,210 Q470,250 500,210" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.7"/>
  <!-- Mitochondrial DNA circle -->
  <circle cx="400" cy="230" r="25" fill="none" stroke="#C4C4C4" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="400" cy="230" r="25" fill="#8b2035" fill-opacity="0.04" filter="url(#g)"/>
  <circle cx="400" cy="230" r="20" fill="none" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.5"/>
  <text x="400" y="233" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.35">mtDNA</text>
  <!-- MOTS-c label emerging from mtDNA -->
  <line x1="420" y1="215" x2="480" y2="160" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.6" stroke-dasharray="3 2"/>
  <text x="490" y="155" fill="#8b2035" font-family="monospace" font-size="8" opacity="0.4">MOTS-c</text>
  <!-- Energy particles / ATP -->
  <g fill="#8b2035" fill-opacity="0.25">
    <circle cx="310" cy="150" r="3" filter="url(#g2)"/>
    <circle cx="370" cy="155" r="2.5" filter="url(#g2)"/>
    <circle cx="430" cy="155" r="2.5" filter="url(#g2)"/>
    <circle cx="490" cy="150" r="3" filter="url(#g2)"/>
  </g>
  <!-- ATP labels -->
  <text x="310" y="140" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.2">ATP</text>
  <text x="490" y="140" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.2">ATP</text>
  <!-- Energy radiating outward -->
  <g stroke="#8b2035" stroke-opacity="0.08" stroke-width="0.5">
    <line x1="580" y1="190" x2="630" y2="190"/>
    <line x1="575" y1="160" x2="620" y2="140"/>
    <line x1="575" y1="220" x2="620" y2="240"/>
    <line x1="220" y1="190" x2="170" y2="190"/>
    <line x1="225" y1="160" x2="180" y2="140"/>
    <line x1="225" y1="220" x2="180" y2="240"/>
  </g>
  <!-- Outer particles -->
  <circle cx="640" cy="190" r="2" fill="#C4C4C4" fill-opacity="0.15"/>
  <circle cx="625" cy="138" r="1.5" fill="#C4C4C4" fill-opacity="0.12"/>
  <circle cx="625" cy="242" r="1.5" fill="#C4C4C4" fill-opacity="0.12"/>
  <circle cx="160" cy="190" r="2" fill="#C4C4C4" fill-opacity="0.15"/>
  <!-- Matrix glow -->
  <ellipse cx="400" cy="190" rx="100" ry="60" fill="#8b2035" fill-opacity="0.03" filter="url(#g)"/>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">LONGEVIDADE</text>
</svg>