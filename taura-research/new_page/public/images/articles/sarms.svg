<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1008"/><stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#c4882a" stroke-opacity="0.05" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Androgen receptor visualization -->
  <g transform="translate(400, 180)">
    <!-- Receptor shape (Y-like) -->
    <path d="M0 40 L0 0 L-40 -60" stroke="#c4882a" stroke-opacity="0.3" stroke-width="2" fill="none"/>
    <path d="M0 0 L40 -60" stroke="#c4882a" stroke-opacity="0.3" stroke-width="2" fill="none"/>
    <!-- Binding domain -->
    <circle cx="-40" cy="-60" r="15" fill="#c4882a" fill-opacity="0.1" stroke="#c4882a" stroke-opacity="0.3"/>
    <circle cx="40" cy="-60" r="15" fill="#c4882a" fill-opacity="0.1" stroke="#c4882a" stroke-opacity="0.3"/>
    <!-- Ligand binding pocket -->
    <circle cx="0" cy="0" r="10" fill="#c4882a" fill-opacity="0.15" stroke="#c4882a" stroke-opacity="0.4"/>
    <!-- DNA binding zone -->
    <rect x="-30" y="50" width="60" height="8" rx="4" fill="#c4882a" fill-opacity="0.1"/>
  </g>
  <!-- Selectivity arrows -->
  <g stroke="#c4882a" stroke-opacity="0.15" stroke-width="0.8" stroke-dasharray="4 3">
    <line x1="280" y1="180" x2="200" y2="140"/><line x1="520" y1="180" x2="600" y2="140"/>
  </g>
  <!-- Tissue labels -->
  <text x="180" y="130" text-anchor="middle" fill="#c4882a" font-family="monospace" font-size="8" opacity="0.4">MÚSCULO ✓</text>
  <text x="620" y="130" text-anchor="middle" fill="#c4882a" font-family="monospace" font-size="8" opacity="0.2">PRÓSTATA ✗</text>
  <!-- Glow -->
  <ellipse cx="400" cy="180" rx="80" ry="80" fill="#c4882a" fill-opacity="0.04" filter="url(#glow)"/>
  <text x="400" y="350" text-anchor="middle" fill="#c4882a" font-family="monospace" font-size="10" letter-spacing="4" opacity="0.2">SARMs</text>
</svg>