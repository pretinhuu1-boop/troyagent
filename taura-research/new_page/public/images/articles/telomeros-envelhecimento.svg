<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- X-shaped chromosome -->
  <!-- Left arm top -->
  <path d="M350,60 Q360,80 370,120 Q380,160 400,200" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="3"/>
  <!-- Right arm top -->
  <path d="M450,60 Q440,80 430,120 Q420,160 400,200" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="3"/>
  <!-- Left arm bottom -->
  <path d="M400,200 Q380,240 370,280 Q360,320 350,340" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="3"/>
  <!-- Right arm bottom -->
  <path d="M400,200 Q420,240 430,280 Q440,320 450,340" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="3"/>
  <!-- Centromere -->
  <ellipse cx="400" cy="200" rx="12" ry="8" fill="#8b2035" fill-opacity="0.1" stroke="#8b2035" stroke-opacity="0.25" stroke-width="0.8"/>
  <!-- Telomere caps - TOP (full length, young) -->
  <rect x="340" y="48" width="22" height="16" rx="3" fill="#8b2035" fill-opacity="0.2" stroke="#8b2035" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="340" y="48" width="22" height="16" rx="3" fill="#8b2035" fill-opacity="0.1" filter="url(#g2)"/>
  <rect x="440" y="48" width="22" height="16" rx="3" fill="#8b2035" fill-opacity="0.2" stroke="#8b2035" stroke-opacity="0.4" stroke-width="0.8"/>
  <rect x="440" y="48" width="22" height="16" rx="3" fill="#8b2035" fill-opacity="0.1" filter="url(#g2)"/>
  <!-- Telomere caps - BOTTOM (shortened, old) -->
  <rect x="345" y="338" width="12" height="10" rx="2" fill="#C4C4C4" fill-opacity="0.1" stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="0.5"/>
  <rect x="445" y="338" width="12" height="10" rx="2" fill="#C4C4C4" fill-opacity="0.1" stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="0.5"/>
  <!-- Shortening visualization - arrow from full to short -->
  <text x="320" y="55" text-anchor="end" fill="#8b2035" font-family="monospace" font-size="6" opacity="0.35">YOUNG</text>
  <text x="320" y="348" text-anchor="end" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">AGED</text>
  <!-- Shortening arrow on left side -->
  <line x1="310" y1="70" x2="310" y2="330" stroke="#C4C4C4" stroke-opacity="0.08" stroke-width="0.5"/>
  <polygon points="310,330 306,320 314,320" fill="#C4C4C4" fill-opacity="0.1"/>
  <!-- Clock motif (right side) -->
  <circle cx="620" cy="180" r="55" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.8"/>
  <circle cx="620" cy="180" r="50" fill="none" stroke="#8b2035" stroke-opacity="0.08" stroke-width="0.4"/>
  <!-- Clock hour marks -->
  <g stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.5">
    <line x1="620" y1="128" x2="620" y2="135"/>
    <line x1="620" y1="225" x2="620" y2="232"/>
    <line x1="568" y1="180" x2="575" y2="180"/>
    <line x1="665" y1="180" x2="672" y2="180"/>
    <line x1="583" y1="143" x2="588" y2="148"/>
    <line x1="652" y1="212" x2="657" y2="217"/>
    <line x1="583" y1="217" x2="588" y2="212"/>
    <line x1="652" y1="148" x2="657" y2="143"/>
  </g>
  <!-- Clock hands -->
  <line x1="620" y1="180" x2="620" y2="145" stroke="#8b2035" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="620" y1="180" x2="645" y2="165" stroke="#C4C4C4" stroke-opacity="0.2" stroke-width="0.7"/>
  <circle cx="620" cy="180" r="3" fill="#8b2035" fill-opacity="0.4"/>
  <!-- Clock glow -->
  <circle cx="620" cy="180" r="40" fill="#8b2035" fill-opacity="0.03" filter="url(#g)"/>
  <text x="620" y="250" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">BIOLOGICAL CLOCK</text>
  <!-- Connection between chromosome and clock -->
  <line x1="470" y1="150" x2="565" y2="170" stroke="#8b2035" stroke-opacity="0.08" stroke-width="0.5" stroke-dasharray="4 4"/>
  <!-- Telomere length scale -->
  <g fill="#C4C4C4" fill-opacity="0.1" font-family="monospace" font-size="5">
    <text x="570" y="300">BIRTH</text>
    <text x="610" y="300">ADULT</text>
    <text x="655" y="300">AGED</text>
  </g>
  <g stroke="#8b2035" stroke-opacity="0.15" stroke-width="2">
    <line x1="575" y1="310" x2="575" y2="335"/>
    <line x1="620" y1="318" x2="620" y2="335"/>
    <line x1="665" y1="325" x2="665" y2="335"/>
  </g>
  <line x1="565" y1="335" x2="680" y2="335" stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.3"/>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">LONGEVIDADE</text>
</svg>