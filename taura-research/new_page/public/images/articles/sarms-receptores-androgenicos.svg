<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Androgen Receptor - large keyhole shape -->
  <path d="M380,100 Q340,100 320,130 Q300,160 310,190 Q315,210 330,220 L330,280 Q330,290 340,290 L360,290 Q365,290 365,280 L365,220 Q380,215 390,200" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.2"/>
  <path d="M420,100 Q460,100 480,130 Q500,160 490,190 Q485,210 470,220 L470,280 Q470,290 460,290 L440,290 Q435,290 435,280 L435,220 Q420,215 410,200" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.2"/>
  <!-- Receptor binding pocket -->
  <path d="M380,100 Q400,80 420,100 Q410,120 400,130 Q390,120 380,100" fill="#8b2035" fill-opacity="0.06"/>
  <path d="M380,100 Q400,80 420,100" fill="none" stroke="#8b2035" stroke-opacity="0.3" stroke-width="1"/>
  <!-- LBD label -->
  <text x="400" y="170" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.25">LBD</text>
  <!-- Receptor glow -->
  <ellipse cx="400" cy="180" rx="60" ry="80" fill="#8b2035" fill-opacity="0.03" filter="url(#g)"/>
  <!-- SARM molecule - key shape approaching -->
  <g transform="translate(-80, -30)">
    <!-- Key head -->
    <circle cx="300" cy="110" r="15" fill="none" stroke="#C4C4C4" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="300" cy="110" r="8" fill="#8b2035" fill-opacity="0.1"/>
    <!-- Key shaft -->
    <line x1="315" y1="110" x2="370" y2="110" stroke="#C4C4C4" stroke-opacity="0.2" stroke-width="1.2"/>
    <!-- Key teeth -->
    <line x1="350" y1="110" x2="350" y2="100" stroke="#C4C4C4" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="360" y1="110" x2="360" y2="103" stroke="#C4C4C4" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="370" y1="110" x2="370" y2="100" stroke="#C4C4C4" stroke-opacity="0.2" stroke-width="0.8"/>
  </g>
  <text x="200" y="65" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.3">SARM</text>
  <!-- Fitting glow -->
  <circle cx="360" cy="90" r="10" fill="#8b2035" fill-opacity="0.08" filter="url(#g2)"/>
  <!-- Tissue selectivity arrows -->
  <!-- Arrow to muscle (positive) -->
  <line x1="450" y1="160" x2="580" y2="120" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <polygon points="580,120 572,115 572,125" fill="#8b2035" fill-opacity="0.25"/>
  <text x="600" y="115" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.3">MUSCLE</text>
  <text x="600" y="128" fill="#8b2035" font-family="monospace" font-size="6" opacity="0.3">ANABOLIC +++</text>
  <!-- Arrow to bone (positive) -->
  <line x1="460" y1="200" x2="580" y2="200" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <polygon points="580,200 572,195 572,205" fill="#8b2035" fill-opacity="0.25"/>
  <text x="600" y="195" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.3">BONE</text>
  <text x="600" y="208" fill="#8b2035" font-family="monospace" font-size="6" opacity="0.3">ANABOLIC ++</text>
  <!-- Arrow to prostate (minimal) -->
  <line x1="450" y1="240" x2="580" y2="280" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.5"/>
  <polygon points="580,280 572,275 572,285" fill="#C4C4C4" fill-opacity="0.1"/>
  <text x="600" y="275" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.15">PROSTATE</text>
  <text x="600" y="288" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.12">MINIMAL</text>
  <!-- Selectivity indicator dots -->
  <circle cx="590" cy="120" r="3" fill="#8b2035" fill-opacity="0.4"/>
  <circle cx="590" cy="200" r="3" fill="#8b2035" fill-opacity="0.3"/>
  <circle cx="590" cy="280" r="2" fill="#C4C4C4" fill-opacity="0.1"/>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">SARMs</text>
</svg>