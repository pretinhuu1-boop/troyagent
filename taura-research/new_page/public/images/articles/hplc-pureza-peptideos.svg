<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Axes -->
  <line x1="120" y1="320" x2="720" y2="320" stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="0.8"/>
  <line x1="120" y1="60" x2="120" y2="320" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.5"/>
  <!-- Axis labels -->
  <text x="420" y="350" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.25">RETENTION TIME (min)</text>
  <text x="75" y="190" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.2" transform="rotate(-90,75,190)">ABSORBANCE (mAU)</text>
  <!-- Time markers -->
  <g fill="#C4C4C4" fill-opacity="0.15" font-family="monospace" font-size="6">
    <text x="120" y="335">0</text><text x="220" y="335">5</text><text x="320" y="335">10</text>
    <text x="420" y="335">15</text><text x="520" y="335">20</text><text x="620" y="335">25</text><text x="720" y="335">30</text>
  </g>
  <!-- Grid lines -->
  <g stroke="#C4C4C4" stroke-opacity="0.04" stroke-width="0.3">
    <line x1="220" y1="60" x2="220" y2="320"/><line x1="320" y1="60" x2="320" y2="320"/>
    <line x1="420" y1="60" x2="420" y2="320"/><line x1="520" y1="60" x2="520" y2="320"/>
    <line x1="620" y1="60" x2="620" y2="320"/>
  </g>
  <!-- Baseline -->
  <line x1="120" y1="310" x2="720" y2="310" stroke="#C4C4C4" stroke-opacity="0.04" stroke-width="0.3" stroke-dasharray="3 3"/>
  <!-- Chromatogram - main peak (high purity target) -->
  <path d="M120,310 L200,310 Q220,310 240,308 Q280,300 320,308 Q340,310 360,310 Q380,308 400,280 Q410,200 420,100 Q425,80 430,75 Q435,80 440,100 Q450,200 460,280 Q480,308 500,310 Q520,310 540,308 Q560,295 570,310 Q590,310 620,310 Q660,310 720,310" fill="none" stroke="#8b2035" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- Fill under main peak -->
  <path d="M380,310 Q380,308 400,280 Q410,200 420,100 Q425,80 430,75 Q435,80 440,100 Q450,200 460,280 Q480,308 500,310 Z" fill="#8b2035" fill-opacity="0.06"/>
  <!-- Peak glow -->
  <ellipse cx="430" cy="120" rx="30" ry="60" fill="#8b2035" fill-opacity="0.06" filter="url(#g)"/>
  <!-- Small impurity peaks -->
  <path d="M280,310 Q290,298 300,290 Q310,298 320,310" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <path d="M540,310 Q550,300 560,295 Q570,300 580,310" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <!-- Peak top marker -->
  <circle cx="430" cy="75" r="3" fill="#8b2035" fill-opacity="0.5" filter="url(#g2)"/>
  <!-- Retention time annotation -->
  <line x1="430" y1="75" x2="430" y2="320" stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.3" stroke-dasharray="2 4"/>
  <text x="430" y="65" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.4">tR = 14.2 min</text>
  <!-- Purity annotation -->
  <text x="430" y="200" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="10" opacity="0.3">98.7%</text>
  <!-- Integration markers -->
  <line x1="380" y1="315" x2="380" y2="325" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.3"/>
  <line x1="500" y1="315" x2="500" y2="325" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.3"/>
  <!-- UV wavelength label -->
  <text x="680" y="80" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.15">λ = 220nm</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">PEPTÍDEOS</text>
</svg>