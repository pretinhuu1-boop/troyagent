<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Timeline axis -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#C4C4C4" stroke-opacity="0.12" stroke-width="0.8"/>
  <!-- Y axis -->
  <line x1="100" y1="80" x2="100" y2="300" stroke="#C4C4C4" stroke-opacity="0.08" stroke-width="0.5"/>
  <!-- Axis labels -->
  <text x="400" y="330" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.2">TIME (h)</text>
  <text x="80" y="190" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.2" transform="rotate(-90,80,190)">[GH] ng/mL</text>
  <!-- Time markers -->
  <g fill="#C4C4C4" fill-opacity="0.15" font-family="monospace" font-size="6">
    <text x="100" y="315">0</text><text x="220" y="315">2</text><text x="340" y="315">4</text>
    <text x="460" y="315">6</text><text x="580" y="315">8</text><text x="700" y="315">10</text>
  </g>
  <!-- GH pulsatile release curve -->
  <path d="M100,290 Q120,285 140,280 Q160,250 180,160 Q190,110 200,100 Q210,110 220,170 Q230,240 250,270 Q270,280 300,278 Q320,260 340,180 Q350,130 360,115 Q370,130 380,190 Q390,250 410,275 Q430,280 460,278 Q480,260 500,190 Q510,140 520,125 Q530,140 540,200 Q550,255 570,275 Q590,280 620,282 Q640,270 660,220 Q670,190 680,180 Q690,200 700,250" fill="none" stroke="#8b2035" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Glow under curve peaks -->
  <ellipse cx="200" cy="120" rx="25" ry="40" fill="#8b2035" fill-opacity="0.06" filter="url(#g)"/>
  <ellipse cx="360" cy="135" rx="25" ry="35" fill="#8b2035" fill-opacity="0.05" filter="url(#g)"/>
  <ellipse cx="520" cy="145" rx="25" ry="30" fill="#8b2035" fill-opacity="0.04" filter="url(#g)"/>
  <ellipse cx="680" cy="200" rx="20" ry="25" fill="#8b2035" fill-opacity="0.03" filter="url(#g)"/>
  <!-- Peak markers -->
  <circle cx="200" cy="100" r="4" fill="#8b2035" fill-opacity="0.5" filter="url(#g2)"/>
  <circle cx="360" cy="115" r="4" fill="#8b2035" fill-opacity="0.45" filter="url(#g2)"/>
  <circle cx="520" cy="125" r="3.5" fill="#8b2035" fill-opacity="0.4" filter="url(#g2)"/>
  <circle cx="680" cy="180" r="3" fill="#8b2035" fill-opacity="0.3" filter="url(#g2)"/>
  <!-- Peak labels -->
  <text x="200" y="85" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.4">PEAK 1</text>
  <text x="360" y="100" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.35">PEAK 2</text>
  <text x="520" y="110" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.3">PEAK 3</text>
  <!-- Baseline reference -->
  <line x1="100" y1="280" x2="700" y2="280" stroke="#C4C4C4" stroke-opacity="0.05" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="720" y="283" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.15">BASAL</text>
  <!-- Injection markers -->
  <g stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="0.5">
    <line x1="140" y1="295" x2="140" y2="305"/>
    <line x1="300" y1="295" x2="300" y2="305"/>
    <line x1="460" y1="295" x2="460" y2="305"/>
  </g>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">PEPTÍDEOS</text>
</svg>