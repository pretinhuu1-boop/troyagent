<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Muscle fiber lines -->
  <g stroke="#8b2035" stroke-opacity="0.12" stroke-width="1.5">
    <path d="M100,120 Q200,115 300,120 Q400,125 500,120 Q600,115 700,120"/>
    <path d="M100,150 Q200,145 300,150 Q400,155 500,150 Q600,145 700,150"/>
    <path d="M100,180 Q200,175 300,180 Q400,185 500,180 Q600,175 700,180"/>
    <path d="M100,210 Q200,205 300,210 Q400,215 500,210 Q600,205 700,210"/>
    <path d="M100,240 Q200,235 300,240 Q400,245 500,240 Q600,235 700,240"/>
  </g>
  <!-- Sarcomere Z-lines -->
  <g stroke="#C4C4C4" stroke-opacity="0.08" stroke-width="0.5">
    <line x1="200" y1="110" x2="200" y2="250"/>
    <line x1="400" y1="110" x2="400" y2="250"/>
    <line x1="600" y1="110" x2="600" y2="250"/>
  </g>
  <!-- ERRα receptor - hexagonal shape -->
  <polygon points="400,270 430,285 430,315 400,330 370,315 370,285" fill="none" stroke="#8b2035" stroke-opacity="0.3" stroke-width="1.2"/>
  <polygon points="400,270 430,285 430,315 400,330 370,315 370,285" fill="#8b2035" fill-opacity="0.06" filter="url(#g)"/>
  <text x="400" y="305" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.35">ERRα</text>
  <!-- Mitochondria shapes -->
  <ellipse cx="250" cy="300" rx="35" ry="18" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <path d="M225,295 Q235,285 245,295" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5"/>
  <path d="M240,300 Q250,290 260,300" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5"/>
  <path d="M255,295 Q265,285 275,295" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5"/>
  <ellipse cx="570" cy="300" rx="35" ry="18" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <path d="M545,295 Q555,285 565,295" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5"/>
  <path d="M560,300 Q570,290 580,300" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5"/>
  <!-- Connection arrows from receptor to mitochondria -->
  <g stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6" stroke-dasharray="4 3">
    <line x1="370" y1="300" x2="290" y2="300"/>
    <line x1="430" y1="300" x2="530" y2="300"/>
  </g>
  <!-- Molecular overlay dots on fibers -->
  <g fill="#8b2035" fill-opacity="0.3">
    <circle cx="300" cy="150" r="3"/><circle cx="400" cy="180" r="3"/><circle cx="500" cy="150" r="3"/>
    <circle cx="350" cy="210" r="2.5"/><circle cx="450" cy="210" r="2.5"/>
  </g>
  <!-- Energy particles -->
  <g fill="#C4C4C4" fill-opacity="0.15">
    <circle cx="240" cy="280" r="1.5"/><circle cx="260" cy="315" r="1.5"/>
    <circle cx="560" cy="280" r="1.5"/><circle cx="580" cy="315" r="1.5"/>
  </g>
  <text x="250" y="340" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">MITO</text>
  <text x="570" y="340" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">MITO</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">SARMs</text>
</svg>