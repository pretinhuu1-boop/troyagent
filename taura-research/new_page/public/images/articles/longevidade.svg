<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1a14"/><stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#2a8b6a" stroke-opacity="0.05" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- DNA double helix with telomere caps -->
  <g stroke="#2a8b6a" stroke-opacity="0.25" stroke-width="1.5" fill="none">
    <path d="M150 200 Q200 160 250 200 Q300 240 350 200 Q400 160 450 200 Q500 240 550 200 Q600 160 650 200"/>
    <path d="M150 200 Q200 240 250 200 Q300 160 350 200 Q400 240 450 200 Q500 160 550 200 Q600 240 650 200"/>
  </g>
  <!-- Telomere caps -->
  <rect x="120" y="188" width="30" height="24" rx="12" fill="#2a8b6a" fill-opacity="0.15" stroke="#2a8b6a" stroke-opacity="0.3"/>
  <rect x="650" y="188" width="30" height="24" rx="12" fill="#2a8b6a" fill-opacity="0.15" stroke="#2a8b6a" stroke-opacity="0.3"/>
  <!-- Rungs -->
  <g stroke="#2a8b6a" stroke-opacity="0.1" stroke-width="0.8">
    <line x1="200" y1="180" x2="200" y2="220"/><line x1="250" y1="200" x2="250" y2="200"/>
    <line x1="300" y1="180" x2="300" y2="220"/><line x1="350" y1="200" x2="350" y2="200"/>
    <line x1="400" y1="180" x2="400" y2="220"/><line x1="450" y1="200" x2="450" y2="200"/>
    <line x1="500" y1="180" x2="500" y2="220"/><line x1="550" y1="200" x2="550" y2="200"/>
    <line x1="600" y1="180" x2="600" y2="220"/>
  </g>
  <!-- Aging timeline -->
  <line x1="150" y1="310" x2="650" y2="310" stroke="#2a8b6a" stroke-opacity="0.1" stroke-width="0.5"/>
  <g fill="#2a8b6a" font-family="monospace" font-size="7" opacity="0.25">
    <text x="150" y="330">JOVEM</text><text x="620" y="330">AGING</text>
  </g>
  <!-- Shortening indicator -->
  <g stroke="#2a8b6a" stroke-opacity="0.15" stroke-width="4" stroke-linecap="round">
    <line x1="200" y1="310" x2="350" y2="310"/>
  </g>
  <g stroke="#2a8b6a" stroke-opacity="0.08" stroke-width="2" stroke-linecap="round">
    <line x1="500" y1="310" x2="600" y2="310"/>
  </g>
  <!-- Glow -->
  <ellipse cx="400" cy="200" rx="200" ry="50" fill="#2a8b6a" fill-opacity="0.03" filter="url(#glow)"/>
  <text x="400" y="370" text-anchor="middle" fill="#2a8b6a" font-family="monospace" font-size="10" letter-spacing="4" opacity="0.2">LONGEVIDADE</text>
</svg>