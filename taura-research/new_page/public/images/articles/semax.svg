<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Neuron cell body -->
  <ellipse cx="400" cy="180" rx="40" ry="35" fill="#8b2035" fill-opacity="0.06" stroke="#8b2035" stroke-opacity="0.25" stroke-width="1.2"/>
  <ellipse cx="400" cy="180" rx="40" ry="35" fill="#8b2035" fill-opacity="0.05" filter="url(#g)"/>
  <!-- Nucleus -->
  <circle cx="400" cy="180" r="12" fill="none" stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="0.8"/>
  <!-- Dendrite branches - left -->
  <path d="M360,170 Q300,140 240,100" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M360,180 Q290,170 220,150" fill="none" stroke="#8b2035" stroke-opacity="0.18" stroke-width="0.8"/>
  <path d="M360,190 Q310,210 250,240" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <path d="M240,100 Q220,80 200,60" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <path d="M240,100 Q260,75 250,50" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <path d="M220,150 Q190,140 160,120" fill="none" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.6"/>
  <path d="M220,150 Q200,165 170,175" fill="none" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.6"/>
  <!-- Dendrite branches - right top -->
  <path d="M440,170 Q490,130 540,100" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M440,160 Q500,140 560,140" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <path d="M540,100 Q570,80 600,60" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <path d="M540,100 Q550,70 530,50" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <!-- Axon going down -->
  <line x1="400" y1="215" x2="400" y2="340" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.2"/>
  <!-- Axon terminal branches -->
  <path d="M400,320 Q380,340 360,350" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <path d="M400,320 Q420,340 440,350" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <!-- Synaptic terminals -->
  <circle cx="360" cy="352" r="4" fill="#8b2035" fill-opacity="0.3"/>
  <circle cx="440" cy="352" r="4" fill="#8b2035" fill-opacity="0.3"/>
  <!-- BDNF molecules floating -->
  <g fill="#C4C4C4" fill-opacity="0.25">
    <circle cx="280" cy="120" r="5"/><text x="280" y="110" text-anchor="middle" font-family="monospace" font-size="5" fill="#C4C4C4" fill-opacity="0.3">BDNF</text>
    <circle cx="500" cy="90" r="4"/>
    <circle cx="180" cy="200" r="3.5"/>
    <circle cx="560" cy="170" r="4.5"/><text x="560" y="160" text-anchor="middle" font-family="monospace" font-size="5" fill="#C4C4C4" fill-opacity="0.3">BDNF</text>
    <circle cx="320" cy="260" r="3"/>
    <circle cx="620" cy="130" r="3"/>
  </g>
  <!-- Synaptic connection sparks -->
  <circle cx="240" cy="100" r="3" fill="#8b2035" fill-opacity="0.4" filter="url(#g2)"/>
  <circle cx="540" cy="100" r="3" fill="#8b2035" fill-opacity="0.4" filter="url(#g2)"/>
  <!-- Dendrite spine bumps -->
  <circle cx="300" cy="140" r="2" fill="#8b2035" fill-opacity="0.3"/>
  <circle cx="270" cy="155" r="1.5" fill="#8b2035" fill-opacity="0.25"/>
  <circle cx="490" cy="130" r="2" fill="#8b2035" fill-opacity="0.3"/>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">NOOTRÓPICOS</text>
</svg>