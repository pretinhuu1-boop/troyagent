<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a0d"/><stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.05" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Peptide chain backbone -->
  <g stroke="#8b2035" stroke-opacity="0.3" stroke-width="1.5" fill="none">
    <path d="M100 200 Q140 170 180 200 Q220 230 260 200 Q300 170 340 200 Q380 230 420 200 Q460 170 500 200 Q540 230 580 200 Q620 170 660 200 Q700 230 740 200"/>
  </g>
  <!-- Amino acid nodes -->
  <g fill="#8b2035" fill-opacity="0.2">
    <circle cx="140" cy="185" r="8"/><circle cx="220" cy="215" r="8"/>
    <circle cx="300" cy="185" r="8"/><circle cx="380" cy="215" r="8"/>
    <circle cx="460" cy="185" r="8"/><circle cx="540" cy="215" r="8"/>
    <circle cx="620" cy="185" r="8"/><circle cx="700" cy="215" r="8"/>
  </g>
  <!-- Side chains -->
  <g stroke="#c4a882" stroke-opacity="0.12" stroke-width="0.8">
    <line x1="140" y1="177" x2="140" y2="150"/><line x1="220" y1="223" x2="220" y2="250"/>
    <line x1="300" y1="177" x2="300" y2="145"/><line x1="380" y1="223" x2="380" y2="255"/>
    <line x1="460" y1="177" x2="460" y2="148"/><line x1="540" y1="223" x2="540" y2="252"/>
    <line x1="620" y1="177" x2="620" y2="150"/><line x1="700" y1="223" x2="700" y2="248"/>
  </g>
  <!-- Glow -->
  <ellipse cx="400" cy="200" rx="250" ry="60" fill="#8b2035" fill-opacity="0.04" filter="url(#glow)"/>
  <text x="400" y="350" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="10" letter-spacing="4" opacity="0.2">PEPTÍDEOS</text>
</svg>