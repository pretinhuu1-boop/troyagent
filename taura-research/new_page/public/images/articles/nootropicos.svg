<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d0d1a"/><stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#4a5a8b" stroke-opacity="0.05" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Neural network -->
  <g fill="#4a5a8b" fill-opacity="0.15">
    <circle cx="200" cy="120" r="6"/><circle cx="300" cy="100" r="6"/>
    <circle cx="400" cy="130" r="8"/><circle cx="500" cy="110" r="6"/>
    <circle cx="600" cy="120" r="6"/><circle cx="250" cy="200" r="7"/>
    <circle cx="350" cy="210" r="6"/><circle cx="450" cy="190" r="7"/>
    <circle cx="550" cy="210" r="6"/><circle cx="150" cy="280" r="5"/>
    <circle cx="300" cy="290" r="6"/><circle cx="400" cy="270" r="8"/>
    <circle cx="500" cy="290" r="6"/><circle cx="650" cy="280" r="5"/>
  </g>
  <!-- Connections -->
  <g stroke="#4a5a8b" stroke-opacity="0.1" stroke-width="0.8">
    <line x1="200" y1="120" x2="300" y2="100"/><line x1="300" y1="100" x2="400" y2="130"/>
    <line x1="400" y1="130" x2="500" y2="110"/><line x1="500" y1="110" x2="600" y2="120"/>
    <line x1="200" y1="120" x2="250" y2="200"/><line x1="300" y1="100" x2="350" y2="210"/>
    <line x1="400" y1="130" x2="450" y2="190"/><line x1="500" y1="110" x2="550" y2="210"/>
    <line x1="600" y1="120" x2="650" y2="280"/><line x1="250" y1="200" x2="300" y2="290"/>
    <line x1="350" y1="210" x2="400" y2="270"/><line x1="450" y1="190" x2="400" y2="270"/>
    <line x1="550" y1="210" x2="500" y2="290"/><line x1="150" y1="280" x2="250" y2="200"/>
    <line x1="300" y1="290" x2="400" y2="270"/><line x1="400" y1="270" x2="500" y2="290"/>
    <line x1="250" y1="200" x2="350" y2="210"/><line x1="450" y1="190" x2="550" y2="210"/>
  </g>
  <!-- Central synapse glow -->
  <circle cx="400" cy="200" r="60" fill="#4a5a8b" fill-opacity="0.04" filter="url(#glow)"/>
  <!-- Labels -->
  <text x="250" y="240" fill="#4a5a8b" font-family="monospace" font-size="7" opacity="0.3">ACh↑</text>
  <text x="450" y="230" fill="#4a5a8b" font-family="monospace" font-size="7" opacity="0.3">BDNF↑</text>
  <text x="350" y="310" fill="#4a5a8b" font-family="monospace" font-size="7" opacity="0.3">GLU</text>
  <text x="400" y="360" text-anchor="middle" fill="#4a5a8b" font-family="monospace" font-size="10" letter-spacing="4" opacity="0.2">NOOTRÓPICOS</text>
</svg>