<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Dividing line -->
  <line x1="400" y1="40" x2="400" y2="360" stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.5" stroke-dasharray="6 4"/>
  <!-- LEFT: Synthetic peptide - geometric/clean -->
  <text x="200" y="70" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="8" opacity="0.25">SYNTHETIC</text>
  <!-- Clean geometric peptide chain -->
  <g stroke="#8b2035" stroke-opacity="0.25" stroke-width="1.2">
    <line x1="100" y1="160" x2="140" y2="140"/>
    <line x1="140" y1="140" x2="180" y2="160"/>
    <line x1="180" y1="160" x2="220" y2="140"/>
    <line x1="220" y1="140" x2="260" y2="160"/>
    <line x1="260" y1="160" x2="300" y2="140"/>
    <line x1="300" y1="140" x2="340" y2="160"/>
  </g>
  <!-- Geometric nodes - perfect circles -->
  <g fill="#8b2035" fill-opacity="0.4">
    <circle cx="100" cy="160" r="4"/><circle cx="140" cy="140" r="4"/>
    <circle cx="180" cy="160" r="4"/><circle cx="220" cy="140" r="4"/>
    <circle cx="260" cy="160" r="4"/><circle cx="300" cy="140" r="4"/>
    <circle cx="340" cy="160" r="4"/>
  </g>
  <!-- Precise side chains -->
  <g stroke="#C4C4C4" stroke-opacity="0.12" stroke-width="0.6">
    <line x1="140" y1="140" x2="140" y2="110"/><line x1="220" y1="140" x2="220" y2="110"/>
    <line x1="300" y1="140" x2="300" y2="110"/>
  </g>
  <circle cx="140" cy="108" r="2" fill="#C4C4C4" fill-opacity="0.2"/>
  <circle cx="220" cy="108" r="2" fill="#C4C4C4" fill-opacity="0.2"/>
  <circle cx="300" cy="108" r="2" fill="#C4C4C4" fill-opacity="0.2"/>
  <!-- Purity indicator -->
  <rect x="120" y="220" width="160" height="8" rx="2" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5"/>
  <rect x="120" y="220" width="155" height="8" rx="2" fill="#8b2035" fill-opacity="0.12"/>
  <text x="200" y="250" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">PURITY 98%</text>
  <!-- RIGHT: Natural peptide - organic shapes -->
  <text x="600" y="70" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="8" opacity="0.25">NATURAL</text>
  <!-- Organic curved peptide chain -->
  <path d="M460,160 Q490,130 520,155 Q545,175 570,145 Q590,120 620,150 Q645,175 670,140 Q695,110 720,145" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1.2"/>
  <!-- Organic nodes - irregular -->
  <ellipse cx="460" cy="160" rx="5" ry="4" fill="#8b2035" fill-opacity="0.3"/>
  <ellipse cx="520" cy="155" rx="4" ry="5" fill="#8b2035" fill-opacity="0.3"/>
  <ellipse cx="570" cy="145" rx="5" ry="4" fill="#8b2035" fill-opacity="0.3"/>
  <ellipse cx="620" cy="150" rx="4.5" ry="5" fill="#8b2035" fill-opacity="0.3"/>
  <ellipse cx="670" cy="140" rx="5" ry="4.5" fill="#8b2035" fill-opacity="0.3"/>
  <ellipse cx="720" cy="145" rx="4" ry="5" fill="#8b2035" fill-opacity="0.3"/>
  <!-- Organic branching side chains -->
  <path d="M520,155 Q530,130 545,120" fill="none" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.6"/>
  <path d="M620,150 Q615,125 625,115" fill="none" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.6"/>
  <path d="M570,145 Q580,170 595,180" fill="none" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.6"/>
  <!-- Folding suggestion -->
  <path d="M500,200 Q550,240 600,220 Q650,200 680,230" fill="none" stroke="#8b2035" stroke-opacity="0.08" stroke-width="0.5" stroke-dasharray="3 3"/>
  <!-- Variability indicator -->
  <rect x="520" y="220" width="160" height="8" rx="2" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.5"/>
  <rect x="520" y="220" width="120" height="8" rx="2" fill="#8b2035" fill-opacity="0.08"/>
  <text x="600" y="250" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">VARIABILITY</text>
  <!-- Connecting arrows -->
  <g stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.7">
    <line x1="350" y1="280" x2="390" y2="300"/><line x1="450" y1="280" x2="410" y2="300"/>
  </g>
  <polygon points="395,298 390,305 400,305" fill="#8b2035" fill-opacity="0.2"/>
  <polygon points="405,298 410,305 400,305" fill="#8b2035" fill-opacity="0.2"/>
  <text x="400" y="320" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.2">COMPARISON</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">PEPTÍDEOS</text>
</svg>