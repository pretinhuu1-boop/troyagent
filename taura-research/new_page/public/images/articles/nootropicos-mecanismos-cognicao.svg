<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Three parallel pathway columns -->
  <!-- PATHWAY 1: Cholinergic -->
  <text x="200" y="55" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="8" letter-spacing="1" opacity="0.4">CHOLINERGIC</text>
  <!-- ACh cascade -->
  <circle cx="200" cy="80" r="12" fill="none" stroke="#8b2035" stroke-opacity="0.25" stroke-width="1"/>
  <text x="200" y="84" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.3">ACh</text>
  <line x1="200" y1="92" x2="200" y2="130" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <polygon points="200,130 196,122 204,122" fill="#8b2035" fill-opacity="0.2"/>
  <circle cx="200" cy="145" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="200" y="149" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.25">nAChR</text>
  <line x1="200" y1="155" x2="200" y2="190" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.6"/>
  <polygon points="200,190 197,184 203,184" fill="#8b2035" fill-opacity="0.15"/>
  <circle cx="200" cy="205" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.6"/>
  <text x="200" y="209" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.2">Ca²⁺</text>
  <line x1="200" y1="215" x2="200" y2="250" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <polygon points="200,250 197,244 203,244" fill="#8b2035" fill-opacity="0.12"/>
  <circle cx="200" cy="265" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <text x="200" y="269" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.18">CREB</text>
  <line x1="200" y1="275" x2="200" y2="310" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.5"/>
  <!-- Glow along pathway -->
  <rect x="188" y="75" width="24" height="210" rx="12" fill="#8b2035" fill-opacity="0.03" filter="url(#g)"/>

  <!-- PATHWAY 2: Glutamatergic -->
  <text x="400" y="55" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="8" letter-spacing="1" opacity="0.4">GLUTAMATERGIC</text>
  <circle cx="400" cy="80" r="12" fill="none" stroke="#8b2035" stroke-opacity="0.25" stroke-width="1"/>
  <text x="400" y="84" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.3">Glu</text>
  <line x1="400" y1="92" x2="400" y2="130" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <polygon points="400,130 396,122 404,122" fill="#8b2035" fill-opacity="0.2"/>
  <circle cx="400" cy="145" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="400" y="149" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.25">NMDA</text>
  <line x1="400" y1="155" x2="400" y2="190" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.6"/>
  <polygon points="400,190 397,184 403,184" fill="#8b2035" fill-opacity="0.15"/>
  <circle cx="400" cy="205" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.6"/>
  <text x="400" y="209" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.2">CaMKII</text>
  <line x1="400" y1="215" x2="400" y2="250" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <polygon points="400,250 397,244 403,244" fill="#8b2035" fill-opacity="0.12"/>
  <circle cx="400" cy="265" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <text x="400" y="269" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.18">LTP</text>
  <line x1="400" y1="275" x2="400" y2="310" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.5"/>
  <rect x="388" y="75" width="24" height="210" rx="12" fill="#8b2035" fill-opacity="0.03" filter="url(#g)"/>

  <!-- PATHWAY 3: Neurotrophic -->
  <text x="600" y="55" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="8" letter-spacing="1" opacity="0.4">NEUROTROPHIC</text>
  <circle cx="600" cy="80" r="12" fill="none" stroke="#8b2035" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="84" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.3">BDNF</text>
  <line x1="600" y1="92" x2="600" y2="130" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <polygon points="600,130 596,122 604,122" fill="#8b2035" fill-opacity="0.2"/>
  <circle cx="600" cy="145" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="600" y="149" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.25">TrkB</text>
  <line x1="600" y1="155" x2="600" y2="190" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.6"/>
  <polygon points="600,190 597,184 603,184" fill="#8b2035" fill-opacity="0.15"/>
  <circle cx="600" cy="205" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.6"/>
  <text x="600" y="209" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.2">PI3K</text>
  <line x1="600" y1="215" x2="600" y2="250" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <polygon points="600,250 597,244 603,244" fill="#8b2035" fill-opacity="0.12"/>
  <circle cx="600" cy="265" r="10" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.6"/>
  <text x="600" y="269" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4" opacity="0.18">SURVIVAL</text>
  <line x1="600" y1="275" x2="600" y2="310" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.5"/>
  <rect x="588" y="75" width="24" height="210" rx="12" fill="#8b2035" fill-opacity="0.03" filter="url(#g)"/>

  <!-- Convergence at bottom -->
  <g stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.5">
    <line x1="200" y1="310" x2="400" y2="340"/>
    <line x1="400" y1="310" x2="400" y2="340"/>
    <line x1="600" y1="310" x2="400" y2="340"/>
  </g>
  <circle cx="400" cy="345" r="6" fill="#8b2035" fill-opacity="0.15" filter="url(#g2)"/>
  <text x="400" y="349" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.25">COGNITION</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">NOOTRÓPICOS</text>
</svg>