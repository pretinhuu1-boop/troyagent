<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- LEFT: Healthy mitochondria -->
  <text x="220" y="60" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.35">HEALTHY</text>
  <!-- Outer membrane -->
  <ellipse cx="220" cy="180" rx="100" ry="60" fill="none" stroke="#8b2035" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Inner membrane -->
  <ellipse cx="220" cy="180" rx="85" ry="48" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.8"/>
  <!-- Well-formed cristae -->
  <path d="M160,165 Q180,135 200,165" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <path d="M190,170 Q210,140 230,170" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <path d="M220,165 Q240,135 260,165" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <path d="M175,195 Q195,225 215,195" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.7"/>
  <path d="M215,195 Q235,225 255,195" fill="none" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.7"/>
  <!-- Healthy glow -->
  <ellipse cx="220" cy="180" rx="60" ry="35" fill="#8b2035" fill-opacity="0.04" filter="url(#g)"/>
  <!-- ATP production -->
  <g fill="#8b2035" fill-opacity="0.3">
    <circle cx="180" cy="155" r="3" filter="url(#g2)"/>
    <circle cx="220" cy="150" r="3" filter="url(#g2)"/>
    <circle cx="260" cy="155" r="3" filter="url(#g2)"/>
  </g>
  <text x="180" y="148" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4" opacity="0.25">ATP</text>
  <text x="260" y="148" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4" opacity="0.25">ATP</text>
  <!-- ETC complexes -->
  <g fill="#8b2035" fill-opacity="0.2">
    <rect x="155" y="175" width="6" height="10" rx="1"/>
    <rect x="175" y="175" width="6" height="10" rx="1"/>
    <rect x="195" y="175" width="6" height="10" rx="1"/>
    <rect x="215" y="175" width="6" height="10" rx="1"/>
    <rect x="245" y="175" width="6" height="10" rx="1"/>
  </g>
  <text x="200" y="200" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4" opacity="0.15">I  II III IV  V</text>

  <!-- Arrow between -->
  <text x="400" y="155" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.15">AGING</text>
  <line x1="340" y1="180" x2="460" y2="180" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.5"/>
  <polygon points="460,180 452,176 452,184" fill="#C4C4C4" fill-opacity="0.12"/>
  <!-- Time arrow -->
  <text x="400" y="200" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.1">mtDNA DAMAGE</text>

  <!-- RIGHT: Damaged mitochondria -->
  <text x="600" y="60" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.2">DAMAGED</text>
  <!-- Damaged outer membrane (irregular) -->
  <path d="M500,160 Q520,115 560,110 Q610,108 650,120 Q690,135 700,165 Q710,195 695,220 Q675,245 640,255 Q600,260 560,252 Q520,245 505,220 Q495,195 500,160" fill="none" stroke="#C4C4C4" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- Broken inner membrane -->
  <path d="M520,165 Q540,140 570,135" fill="none" stroke="#C4C4C4" stroke-opacity="0.08" stroke-width="0.5"/>
  <path d="M590,130 Q620,125 650,140" fill="none" stroke="#C4C4C4" stroke-opacity="0.08" stroke-width="0.5"/>
  <path d="M530,210 Q550,230 580,225" fill="none" stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.5"/>
  <!-- Broken cristae -->
  <path d="M540,170 Q555,150 565,170" fill="none" stroke="#C4C4C4" stroke-opacity="0.08" stroke-width="0.5" stroke-dasharray="2 2"/>
  <path d="M580,165 Q590,148 595,165" fill="none" stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.5" stroke-dasharray="2 2"/>
  <path d="M620,170 Q630,155 640,168" fill="none" stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.5" stroke-dasharray="2 2"/>
  <!-- Membrane breach -->
  <path d="M695,190 Q710,190 720,185" fill="none" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.4"/>
  <!-- ROS particles -->
  <g fill="#8b2035" fill-opacity="0.35">
    <circle cx="530" cy="145" r="3" filter="url(#g2)"/>
    <circle cx="620" cy="130" r="2.5" filter="url(#g2)"/>
    <circle cx="670" cy="160" r="3" filter="url(#g2)"/>
    <circle cx="690" cy="200" r="2.5" filter="url(#g2)"/>
    <circle cx="650" cy="240" r="2" filter="url(#g2)"/>
    <circle cx="545" cy="220" r="2.5" filter="url(#g2)"/>
    <circle cx="715" cy="180" r="2"/>
  </g>
  <text x="720" y="165" fill="#8b2035" font-family="monospace" font-size="5" opacity="0.3">ROS</text>
  <text x="525" y="138" fill="#8b2035" font-family="monospace" font-size="5" opacity="0.3">O₂⁻</text>
  <text x="690" y="215" fill="#8b2035" font-family="monospace" font-size="5" opacity="0.25">H₂O₂</text>

  <!-- Biogenesis arrows (bottom) -->
  <text x="400" y="295" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.3">BIOGENESIS</text>
  <!-- PGC-1alpha -->
  <circle cx="400" cy="320" r="15" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="400" y="324" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.25">PGC-1α</text>
  <!-- Arrows from PGC-1alpha to new mitochondria -->
  <line x1="385" y1="310" x2="300" y2="260" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="415" y1="310" x2="500" y2="260" stroke="#8b2035" stroke-opacity="0.08" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">LONGEVIDADE</text>
</svg>