<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- LEFT: Peptide chain (large molecule) -->
  <text x="200" y="55" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="8" opacity="0.25">PEPTIDIC</text>
  <!-- Peptide backbone - folded chain -->
  <path d="M100,130 L130,110 L160,130 L190,110 L220,130 L250,110 L280,130 L280,150 L250,170 L220,150 L190,170 L160,150 L130,170 L100,150 Z" fill="none" stroke="#8b2035" stroke-opacity="0.25" stroke-width="1.2"/>
  <!-- Amino acid nodes -->
  <g fill="#8b2035" fill-opacity="0.35">
    <circle cx="100" cy="130" r="4"/><circle cx="130" cy="110" r="3.5"/>
    <circle cx="160" cy="130" r="4"/><circle cx="190" cy="110" r="3.5"/>
    <circle cx="220" cy="130" r="4"/><circle cx="250" cy="110" r="3.5"/>
    <circle cx="280" cy="130" r="4"/>
  </g>
  <!-- Side chains -->
  <g stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.5">
    <line x1="130" y1="110" x2="130" y2="85"/><line x1="190" y1="110" x2="190" y2="85"/>
    <line x1="250" y1="110" x2="250" y2="85"/>
  </g>
  <text x="190" y="195" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">MW: 800-5000 Da</text>
  <!-- Bioavailability arrow (low - peptide) -->
  <text x="190" y="220" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">ORAL BIOAVAIL.</text>
  <rect x="120" y="228" width="140" height="6" rx="2" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.4"/>
  <rect x="120" y="228" width="25" height="6" rx="2" fill="#8b2035" fill-opacity="0.15"/>
  <text x="155" y="252" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.2">LOW</text>

  <!-- RIGHT: Small molecule -->
  <text x="600" y="55" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="8" opacity="0.25">SYNTHETIC</text>
  <!-- Small molecule structure -->
  <g stroke="#8b2035" stroke-opacity="0.25" stroke-width="1.2" fill="none">
    <polygon points="570,110 590,98 614,106 618,130 600,140 578,132"/>
    <line x1="618" y1="130" x2="640" y2="140"/>
    <circle cx="650" cy="145" r="8"/>
  </g>
  <circle cx="570" cy="110" r="3" fill="#8b2035" fill-opacity="0.3"/>
  <circle cx="618" cy="130" r="3" fill="#8b2035" fill-opacity="0.3"/>
  <circle cx="650" cy="145" r="2.5" fill="#C4C4C4" fill-opacity="0.2"/>
  <text x="600" y="180" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">MW: 150-500 Da</text>
  <!-- Bioavailability arrow (high - synthetic) -->
  <text x="600" y="220" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">ORAL BIOAVAIL.</text>
  <rect x="530" y="228" width="140" height="6" rx="2" fill="none" stroke="#8b2035" stroke-opacity="0.12" stroke-width="0.4"/>
  <rect x="530" y="228" width="110" height="6" rx="2" fill="#8b2035" fill-opacity="0.2"/>
  <text x="650" y="252" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.2">HIGH</text>

  <!-- BBB Barrier in center -->
  <rect x="370" y="265" width="60" height="60" rx="4" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="370" y="265" width="60" height="60" rx="4" fill="#8b2035" fill-opacity="0.04"/>
  <text x="400" y="290" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.3">BBB</text>
  <text x="400" y="302" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.2">BLOOD-BRAIN</text>
  <text x="400" y="312" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="4.5" opacity="0.2">BARRIER</text>
  <!-- Tight junction lines -->
  <g stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.4">
    <line x1="375" y1="265" x2="375" y2="325"/>
    <line x1="390" y1="265" x2="390" y2="325"/>
    <line x1="410" y1="265" x2="410" y2="325"/>
    <line x1="425" y1="265" x2="425" y2="325"/>
  </g>
  <!-- Arrows approaching BBB -->
  <!-- Peptide arrow (blocked/partial) -->
  <line x1="250" y1="295" x2="365" y2="295" stroke="#8b2035" stroke-opacity="0.15" stroke-width="0.7" stroke-dasharray="4 4"/>
  <text x="300" y="288" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.15">INTRANASAL</text>
  <!-- Synthetic arrow (passes through) -->
  <line x1="550" y1="295" x2="435" y2="295" stroke="#8b2035" stroke-opacity="0.25" stroke-width="0.8"/>
  <polygon points="435,295 442,291 442,299" fill="#8b2035" fill-opacity="0.2"/>
  <!-- Glow at BBB -->
  <ellipse cx="400" cy="295" rx="30" ry="25" fill="#8b2035" fill-opacity="0.04" filter="url(#g)"/>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">NOOTRÓPICOS</text>
</svg>