<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- DNA double helix -->
  <g fill="none" stroke-width="1.2">
    <!-- Strand 1 -->
    <path d="M200,60 Q240,80 260,100 Q280,120 260,140 Q240,160 260,180 Q280,200 260,220 Q240,240 260,260 Q280,280 260,300 Q240,320 260,340" stroke="#8b2035" stroke-opacity="0.25"/>
    <!-- Strand 2 -->
    <path d="M340,60 Q300,80 280,100 Q260,120 280,140 Q300,160 280,180 Q260,200 280,220 Q300,240 280,260 Q260,280 280,300 Q300,320 280,340" stroke="#8b2035" stroke-opacity="0.25"/>
  </g>
  <!-- Base pair rungs -->
  <g stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.6">
    <line x1="248" y1="90" x2="292" y2="90"/>
    <line x1="268" y1="110" x2="272" y2="110"/>
    <line x1="258" y1="130" x2="282" y2="130"/>
    <line x1="268" y1="150" x2="272" y2="150"/>
    <line x1="258" y1="170" x2="282" y2="170"/>
    <line x1="268" y1="190" x2="272" y2="190"/>
    <line x1="258" y1="210" x2="282" y2="210"/>
    <line x1="268" y1="230" x2="272" y2="230"/>
    <line x1="258" y1="250" x2="282" y2="250"/>
    <line x1="268" y1="270" x2="272" y2="270"/>
    <line x1="258" y1="290" x2="282" y2="290"/>
    <line x1="268" y1="310" x2="272" y2="310"/>
    <line x1="258" y1="330" x2="282" y2="330"/>
  </g>
  <!-- Telomere caps - TOP (highlighted) -->
  <rect x="230" y="50" width="80" height="20" rx="4" fill="#8b2035" fill-opacity="0.1" stroke="#8b2035" stroke-opacity="0.35" stroke-width="1"/>
  <rect x="230" y="50" width="80" height="20" rx="4" fill="#8b2035" fill-opacity="0.06" filter="url(#g)"/>
  <text x="270" y="64" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.4">TTAGGG</text>
  <!-- Telomere caps - BOTTOM (highlighted) -->
  <rect x="230" y="340" width="80" height="20" rx="4" fill="#8b2035" fill-opacity="0.1" stroke="#8b2035" stroke-opacity="0.35" stroke-width="1"/>
  <rect x="230" y="340" width="80" height="20" rx="4" fill="#8b2035" fill-opacity="0.06" filter="url(#g)"/>
  <text x="270" y="354" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.4">TTAGGG</text>
  <!-- Telomerase enzyme approaching from right -->
  <ellipse cx="520" cy="200" rx="55" ry="35" fill="none" stroke="#8b2035" stroke-opacity="0.2" stroke-width="1"/>
  <ellipse cx="520" cy="200" rx="55" ry="35" fill="#8b2035" fill-opacity="0.04" filter="url(#g)"/>
  <text x="520" y="195" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="7" opacity="0.3">TELOMERASE</text>
  <text x="520" y="210" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">hTERT</text>
  <!-- Arrow from telomerase to DNA -->
  <line x1="465" y1="200" x2="350" y2="200" stroke="#8b2035" stroke-opacity="0.2" stroke-width="0.8" stroke-dasharray="5 3"/>
  <polygon points="350,200 360,196 360,204" fill="#8b2035" fill-opacity="0.25"/>
  <!-- RNA template inside telomerase -->
  <path d="M490,205 Q510,215 530,205 Q550,195 560,205" fill="none" stroke="#C4C4C4" stroke-opacity="0.12" stroke-width="0.5"/>
  <!-- Activation particles -->
  <g fill="#8b2035" fill-opacity="0.2">
    <circle cx="440" cy="180" r="2"/><circle cx="420" cy="210" r="1.5"/>
    <circle cx="450" cy="220" r="1.5"/><circle cx="410" cy="190" r="1.5"/>
  </g>
  <!-- Repeat labels -->
  <text x="650" y="120" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.15">5'-TTAGGG-3'</text>
  <text x="650" y="135" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.15">5'-TTAGGG-3'</text>
  <text x="650" y="150" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.12">5'-TTAGGG-3'</text>
  <text x="650" y="165" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.09">5'-TTAGGG-3'</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">LONGEVIDADE</text>
</svg>