<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0508"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g stroke="#8b2035" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Skin layer cross-section (left side) -->
  <!-- Epidermis -->
  <path d="M60,120 Q100,115 140,120 Q180,125 220,120" fill="none" stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="240" y="118" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.2">EPIDERMIS</text>
  <!-- Dermis -->
  <path d="M60,160 Q100,155 140,160 Q180,165 220,160" fill="none" stroke="#C4C4C4" stroke-opacity="0.12" stroke-width="0.6"/>
  <text x="240" y="158" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.2">DERMIS</text>
  <!-- Subcutaneous -->
  <rect x="60" y="170" width="170" height="50" fill="#8b2035" fill-opacity="0.04" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.5"/>
  <text x="240" y="198" fill="#8b2035" font-family="monospace" font-size="5" opacity="0.3">SUBCUTANEOUS</text>
  <!-- Muscle -->
  <path d="M60,230 Q100,225 140,230 Q180,235 220,230" fill="none" stroke="#C4C4C4" stroke-opacity="0.08" stroke-width="0.6"/>
  <text x="240" y="228" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.15">MUSCLE</text>
  <!-- Needle -->
  <line x1="120" y1="80" x2="140" y2="190" stroke="#C4C4C4" stroke-opacity="0.25" stroke-width="1.2"/>
  <line x1="115" y1="80" x2="125" y2="80" stroke="#C4C4C4" stroke-opacity="0.2" stroke-width="2"/>
  <!-- Injection depot glow -->
  <circle cx="140" cy="190" r="12" fill="#8b2035" fill-opacity="0.1" filter="url(#g)"/>
  <circle cx="140" cy="190" r="5" fill="#8b2035" fill-opacity="0.3"/>
  <!-- Absorption particles dispersing -->
  <g fill="#8b2035" fill-opacity="0.2">
    <circle cx="155" cy="185" r="1.5"/><circle cx="160" cy="195" r="1.5"/>
    <circle cx="150" cy="200" r="1.5"/><circle cx="165" cy="190" r="1.5"/>
    <circle cx="170" cy="200" r="1"/>
  </g>
  <!-- PK Curve (right side) -->
  <!-- Axes -->
  <line x1="350" y1="310" x2="720" y2="310" stroke="#C4C4C4" stroke-opacity="0.15" stroke-width="0.8"/>
  <line x1="350" y1="80" x2="350" y2="310" stroke="#C4C4C4" stroke-opacity="0.1" stroke-width="0.5"/>
  <!-- PK curve -->
  <path d="M350,310 Q370,305 390,280 Q410,200 430,140 Q440,110 450,100 Q460,110 480,140 Q510,190 540,220 Q570,245 600,260 Q640,275 680,285 Q700,290 720,295" fill="none" stroke="#8b2035" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Fill under curve -->
  <path d="M350,310 Q370,305 390,280 Q410,200 430,140 Q440,110 450,100 Q460,110 480,140 Q510,190 540,220 Q570,245 600,260 Q640,275 680,285 Q700,290 720,295 L720,310 Z" fill="#8b2035" fill-opacity="0.04"/>
  <!-- Cmax marker -->
  <circle cx="450" cy="100" r="4" fill="#8b2035" fill-opacity="0.5" filter="url(#g2)"/>
  <line x1="450" y1="100" x2="450" y2="310" stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.3" stroke-dasharray="2 4"/>
  <line x1="350" y1="100" x2="450" y2="100" stroke="#C4C4C4" stroke-opacity="0.06" stroke-width="0.3" stroke-dasharray="2 4"/>
  <!-- Annotations -->
  <text x="455" y="90" fill="#8b2035" font-family="monospace" font-size="7" opacity="0.4">Cmax</text>
  <text x="450" y="325" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.25">Tmax</text>
  <!-- Therapeutic window -->
  <rect x="350" y="150" width="370" height="80" fill="#8b2035" fill-opacity="0.02" stroke="#8b2035" stroke-opacity="0.06" stroke-width="0.3" stroke-dasharray="4 4"/>
  <text x="730" y="185" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.15">MEC</text>
  <text x="730" y="155" fill="#C4C4C4" font-family="monospace" font-size="5" opacity="0.15">MTC</text>
  <!-- Axis labels -->
  <text x="535" y="345" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.2">TIME (h)</text>
  <text x="335" y="195" text-anchor="middle" fill="#C4C4C4" font-family="monospace" font-size="6" opacity="0.15" transform="rotate(-90,335,195)">[PLASMA]</text>
  <!-- Connection arrow from skin to curve -->
  <path d="M220,190 Q280,190 340,250" fill="none" stroke="#8b2035" stroke-opacity="0.1" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="400" y="385" text-anchor="middle" fill="#8b2035" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.2">PEPTÍDEOS</text>
</svg>